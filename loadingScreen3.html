<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading - Islamophobia Content Analytic</title>
    <style>
        /* ===== RESET & BASE STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== EPIC LOADING SCREEN ===== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #4a5568 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.8s ease;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* Animated Background Elements */
        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .shape:nth-child(1) { width: 80px; height: 80px; top: 10%; left: 10%; animation-delay: 0s; }
        .shape:nth-child(2) { width: 120px; height: 120px; top: 70%; left: 80%; animation-delay: 1s; }
        .shape:nth-child(3) { width: 60px; height: 60px; top: 20%; left: 85%; animation-delay: 2s; }
        .shape:nth-child(4) { width: 100px; height: 100px; top: 80%; left: 15%; animation-delay: 3s; }

        /* Neural Network Animation */
        .neural-network {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .node {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(72, 187, 120, 0.8);
            border-radius: 50%;
            animation: nodePulse 2s ease-in-out infinite;
        }

        .connection {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, #48bb78, transparent);
            transform-origin: left center;
            animation: connectionFlow 3s linear infinite;
        }

        .loading-container {
            text-align: center;
            color: white;
            max-width: 90%;
            width: 100%;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        /* Enhanced Logo Animation */
        .loading-logo {
            margin-bottom: 2rem;
            position: relative;
        }

        .logo-icon {
            margin-bottom: 1.5rem;
            position: relative;
            display: inline-block;
        }

        .logo-icon img {
            width: clamp(80px, 18vw, 140px);
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
            animation: logoGlow 3s ease-in-out infinite, logoFloat 4s ease-in-out infinite;
        }

        .logo-orbits {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
        }

        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .orbit-1 { width: 120px; height: 120px; animation: orbitRotate 8s linear infinite; }
        .orbit-2 { width: 160px; height: 160px; animation: orbitRotate 12s linear infinite reverse; }
        .orbit-3 { width: 200px; height: 200px; animation: orbitRotate 16s linear infinite; }

        .orbit-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #48bb78;
            border-radius: 50%;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .loading-logo h2 {
            font-size: clamp(1.8rem, 6vw, 3.2rem);
            margin-bottom: 0.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ffffff, #e2e8f0, #48bb78);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleShimmer 4s ease-in-out infinite;
            line-height: 1.2;
        }

        .loading-logo p {
            font-size: clamp(1rem, 3.5vw, 1.4rem);
            opacity: 0.9;
            margin-bottom: 2rem;
            line-height: 1.4;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .loading-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
        }

        /* Enhanced Spinner */
        .loading-spinner {
            margin: 0;
            position: relative;
        }

        .spinner {
            width: clamp(50px, 12vw, 80px);
            height: clamp(50px, 12vw, 80px);
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #48bb78;
            border-right: 3px solid #667eea;
            border-bottom: 3px solid #764ba2;
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 1.5s linear infinite, spinnerColor 4s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(72, 187, 120, 0.3);
        }

        .spinner-inner {
            width: 70%;
            height: 70%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top: 2px solid transparent;
            border-radius: 50%;
            position: absolute;
            top: 15%;
            left: 15%;
            animation: spin 2s linear infinite reverse;
        }

        /* Dynamic Progress Bar */
        .loading-progress {
            width: 100%;
            max-width: 500px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            margin: 0 auto 1.5rem;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #48bb78, #667eea, #764ba2);
            border-radius: 4px;
            width: 0%;
            animation: progress 3s ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            animation: progressShine 2s ease-in-out infinite;
        }

        .progress-text {
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            opacity: 0.9;
            font-weight: 500;
            min-height: 1.5em;
            transition: all 0.3s ease;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            margin-top: 1rem;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            opacity: 0.7;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-dot {
            width: 8px;
            height: 8px;
            background: #48bb78;
            border-radius: 50%;
            animation: statPulse 2s ease-in-out infinite;
        }

        /* Enhanced Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        @keyframes logoGlow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3)); }
            50% { filter: drop-shadow(0 0 30px rgba(72, 187, 120, 0.5)); }
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes orbitRotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes titleShimmer {
            0%, 100% { background-position: -200% center; }
            50% { background-position: 200% center; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spinnerColor {
            0%, 100% { border-top-color: #48bb78; border-right-color: #667eea; }
            33% { border-top-color: #667eea; border-right-color: #764ba2; }
            66% { border-top-color: #764ba2; border-right-color: #48bb78; }
        }

        @keyframes progress {
            0% { width: 0%; }
            30% { width: 45%; }
            60% { width: 75%; }
            100% { width: 100%; }
        }

        @keyframes progressShine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @keyframes nodePulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        @keyframes connectionFlow {
            0% { opacity: 0; transform: scaleX(0); }
            50% { opacity: 1; transform: scaleX(1); }
            100% { opacity: 0; transform: scaleX(0); }
        }

        @keyframes statPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ===== RESPONSIVE BREAKPOINTS ===== */
        @media (max-width: 768px) {
            .loading-container {
                padding: 1.5rem;
            }
            
            .loading-content {
                gap: 2rem;
            }
            
            .progress-bar {
                height: 6px;
                margin-bottom: 1.2rem;
            }
            
            .logo-icon img {
                width: clamp(70px, 15vw, 120px);
            }

            .orbit-1 { width: 100px; height: 100px; }
            .orbit-2 { width: 130px; height: 130px; }
            .orbit-3 { width: 160px; height: 160px; }
        }

        @media (max-width: 480px) {
            .loading-container {
                padding: 1rem;
            }
            
            .loading-logo .logo-icon {
                margin-bottom: 1rem;
            }
            
            .logo-icon img {
                width: clamp(60px, 12vw, 100px);
            }
            
            .loading-logo h2 {
                margin-bottom: 0.5rem;
            }
            
            .loading-logo p {
                margin-bottom: 1.5rem;
            }
            
            .loading-content {
                gap: 1.5rem;
            }
            
            .progress-bar {
                height: 5px;
                margin-bottom: 1rem;
            }
            
            .spinner {
                width: 45px;
                height: 45px;
            }
        }

        /* Landscape mode optimization */
        @media (max-height: 500px) and (orientation: landscape) {
            .loading-container {
                padding: 1rem;
                transform: scale(0.85);
            }
            
            .loading-logo .logo-icon {
                margin-bottom: 0.5rem;
            }
            
            .logo-icon img {
                width: 50px;
            }
            
            .loading-content {
                gap: 1rem;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Epic Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <!-- Animated Background -->
        <div class="floating-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>

        <!-- Neural Network Visualization -->
        <div class="neural-network" id="neuralNetwork"></div>

        <div class="loading-container">
            <div class="loading-logo">
                <div class="logo-icon">
                    <div class="logo-orbits">
                        <div class="orbit orbit-1"><div class="orbit-dot"></div></div>
                        <div class="orbit orbit-2"><div class="orbit-dot"></div></div>
                        <div class="orbit orbit-3"><div class="orbit-dot"></div></div>
                    </div>
                    <img src="images/research3.png" alt="Research Logo" class="loading-logo-img">
                </div>
                <h2>Islamophobia Analytic System</h2>
                <p>Hierachical Classification Cross Platform Social Media Data</p>
            </div>
            <div class="loading-content">
                <div class="loading-spinner">
                    <div class="spinner">
                        <div class="spinner-inner"></div>
                    </div>
                </div>
                <div class="loading-progress">
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                    <span class="progress-text" id="progressText">Initializing Neural Networks...</span>
                    <div class="progress-stats">
                        <div class="stat">
                            <div class="stat-dot"></div>
                            <span>AI Model</span>
                        </div>
                        <div class="stat">
                            <div class="stat-dot"></div>
                            <span>BiLSTM Engine</span>
                        </div>
                        <div class="stat">
                            <div class="stat-dot"></div>
                            <span>Ready</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dynamic progress messages
        const messages = [
            { text: "🚀 Initializing Neural Networks...", delay: 0 },
            { text: "🧠 Loading Hierarchical BiLSTM...", delay: 800 },
            { text: "📊 Processing Training Data...", delay: 1600 },
            { text: "⚡ Optimizing Classification Engine...", delay: 2400 },
            { text: "✅ System Ready - Launching...", delay: 3200 }
        ];

        const progressText = document.getElementById('progressText');
        const loadingScreen = document.getElementById('loadingScreen');

        // Animate progress messages
        messages.forEach((message, index) => {
            setTimeout(() => {
                progressText.style.opacity = '0';
                setTimeout(() => {
                    progressText.textContent = message.text;
                    progressText.style.opacity = '1';
                }, 200);
            }, message.delay);
        });

        // Create neural network visualization
        function createNeuralNetwork() {
            const container = document.getElementById('neuralNetwork');
            const nodes = 15;
            const connections = 25;

            // Create nodes
            for (let i = 0; i < nodes; i++) {
                const node = document.createElement('div');
                node.className = 'node';
                node.style.left = Math.random() * 100 + '%';
                node.style.top = Math.random() * 100 + '%';
                node.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(node);
            }

            // Create connections
            for (let i = 0; i < connections; i++) {
                const connection = document.createElement('div');
                connection.className = 'connection';
                
                const startX = Math.random() * 100;
                const startY = Math.random() * 100;
                const endX = Math.random() * 100;
                const endY = Math.random() * 100;
                
                const length = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
                const angle = Math.atan2(endY - startY, endX - startX) * 180 / Math.PI;
                
                connection.style.width = length + 'vw';
                connection.style.left = startX + '%';
                connection.style.top = startY + '%';
                connection.style.transform = `rotate(${angle}deg)`;
                connection.style.animationDelay = Math.random() * 3 + 's';
                
                container.appendChild(connection);
            }
        }

        // Initialize neural network
        createNeuralNetwork();

        // Auto redirect after 4 seconds with smooth fade out
        setTimeout(() => {
            loadingScreen.classList.add('fade-out');
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 800);
        }, 4000);
    </script>
</body>
</html>
